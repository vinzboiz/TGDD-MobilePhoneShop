<!doctype html>
<html
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Product Details - Demo E-Commerce</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <style>
      .navbar {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .product-gallery img {
        max-width: 100%;
        margin-bottom: 1rem;
      }
      .thumb-img {
        width: 75px;
        height: 75px;
        object-fit: cover;
        border: 1px solid #ddd;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">🛍️ E-Commerce</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item">
              <a class="nav-link" href="/categories">Categories</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/products">Products</a>
            </li>
            <li class="nav-item" sec:authorize="!isAuthenticated()">
              <a class="nav-link" href="/auth/login">Login</a>
            </li>
            <li class="nav-item" sec:authorize="!isAuthenticated()">
              <a class="nav-link" href="/auth/register">Register</a>
            </li>
            <li class="nav-item" sec:authorize="isAuthenticated()">
              <a class="nav-link" href="/cart">Cart</a>
            </li>
            <li class="nav-item" sec:authorize="isAuthenticated()">
              <a class="nav-link" href="/account">Account</a>
            </li>
            <li class="nav-item" sec:authorize="isAuthenticated()">
              <a class="nav-link" href="/auth/logout">Logout</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row">
        <div class="col-md-6">
          <div class="product-gallery">
            <img
              th:if="${product.imageData != null}"
              th:src="@{/products/image/{id}(id=${product.id})}"
              th:alt="${product.name}"
              id="mainImage"
              alt="Product"
            />
            <div th:if="${product.imageData == null}" class="bg-light border rounded d-flex align-items-center justify-content-center" style="min-height: 300px;">
              <span class="text-muted">📷 No Image</span>
            </div>
            <div class="d-flex mt-2" th:if="${product.imageData != null and extras != null and !extras.isEmpty()}">
              <img
                th:each="si : ${extras}"
                th:src="@{/products/image/{id}/{idx}(id=${product.id},idx=${si.position +1})}"
                th:alt="${product.name + ' - image ' + (si.position + 1)}"
                alt="Product thumbnail"
                class="thumb-img me-2"
                th:attr="data-src=@{/products/image/{id}/{idx}(id=${product.id},idx=${si.position +1})}"
                role="button"
                onclick="
                  document.getElementById('mainImage').src =
                    this.getAttribute('data-src')
                "
              />
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <h2 th:text="${product.name}">Product Name</h2>
          <p
            class="text-muted"
            th:text="${'Category: ' + (product.category != null ? product.category.name : (product.parentCategory != null ? product.parentCategory.name : '—'))}"
          >
            Category
          </p>
          <div class="mb-2">
            <span
              th:if="${product.discountPercent != null && product.discountPercent > 0}"
            >
              <span
                class="text-muted text-decoration-line-through"
                th:text="'\$' + ${#numbers.formatDecimal(product.price,1,2)}"
              ></span>
              <span
                class="ms-2 text-danger fw-bold"
                th:text="'\$' + ${#numbers.formatDecimal(product.price * (100 - product.discountPercent) / 100,1,2)}"
              ></span>
              <span
                class="badge bg-danger ms-1"
                th:text="${product.discountPercent + '% OFF'}"
              ></span>
            </span>
            <span
              th:unless="${product.discountPercent != null && product.discountPercent > 0}"
            >
              <h4
                class="text-primary"
                th:text="'\$' + ${#numbers.formatDecimal(product.price,1,2)}"
              >
                $0.00
              </h4>
            </span>
          </div>
          <p th:if="${product.description}" th:text="${product.description}">
            Description...
          </p>

          <!-- Stock Status -->
          <p class="mt-3">
            <span th:if="${product.stock > 0}" class="badge bg-success"
              >In Stock</span
            >
            <span th:if="${product.stock <= 0}" class="badge bg-danger"
              >Out of Stock</span
            >
          </p>

          <!-- Add to Cart Form (Authenticated Users) -->
          <div
            sec:authorize="isAuthenticated()"
            class="mt-3"
            th:if="${product.stock > 0}"
          >
            <form
              th:action="@{/cart/add/{id}(id=${product.id})}"
              method="post"
              class="d-inline"
            >
              <div class="input-group" style="width: 180px">
                <label for="quantity-input" class="visually-hidden">Quantity</label>
                <input
                  id="quantity-input"
                  type="number"
                  name="quantity"
                  value="1"
                  min="1"
                  th:max="${product.stock}"
                  class="form-control"
                  aria-label="Quantity"
                />
                <button type="submit" class="btn btn-primary">
                  🛒 Add to Cart
                </button>
              </div>
            </form>
          </div>

          <!-- Login Prompt for Guests -->
          <div sec:authorize="!isAuthenticated()" class="mt-3">
            <p class="text-warning">
              <strong
                >⚠️ Please <a href="/auth/login" class="alert-link">login</a> to
                add items to cart</strong
              >
            </p>
          </div>

          <div class="mt-3">
            <a
              href="/products/edit/"
              th:href="@{/products/edit/{id}(id=${product.id})}"
              class="btn btn-warning me-2"
              >✏️ Edit</a
            >
            <a href="/products" class="btn btn-secondary">Back to list</a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
