<!doctype html>
<html
  lang="vi"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thiết lập Authenticator - Đổi điểm tích lũy</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css(v=2)}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/account.css}" />
  </head>
  <body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container my-4">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a th:href="@{/account}">Tài khoản</a></li>
          <li class="breadcrumb-item"><a th:href="@{/account/redeem}">Đổi điểm tích lũy</a></li>
          <li class="breadcrumb-item active">Thiết lập Authenticator</li>
        </ol>
      </nav>

      <h1 class="mb-4">Thiết lập Authenticator</h1>

      <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-4">
          <p class="text-muted mb-4">
            Quét mã QR bằng <strong>Microsoft Authenticator</strong> hoặc <strong>Google Authenticator</strong> để xác thực khi đổi điểm.
          </p>
          <div class="text-center mb-4">
            <img
              th:src="${qrDataUrl}"
              alt="QR Code Authenticator"
              width="200"
              height="200"
              class="img-fluid border rounded"
            />
          </div>
          <p class="small text-muted mb-3">
            Không thể quét? Nhập mã thủ công: <code th:text="${secret}">SECRET</code>
          </p>

          <form th:action="@{/account/redeem/setup}" method="post" class="mt-4">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}" />
            <div class="mb-3">
              <label for="totpCode" class="form-label">Nhập mã 6 số từ ứng dụng Authenticator</label>
              <input
                type="text"
                id="totpCode"
                name="totpCode"
                class="form-control form-control-lg text-center"
                maxlength="6"
                pattern="[0-9]{6}"
                placeholder="000000"
                required
                autocomplete="one-time-code"
              />
              <div class="form-text">Mã thay đổi mỗi 30 giây</div>
            </div>
            <button type="submit" class="btn btn-primary">Xác nhận thiết lập</button>
            <a th:href="@{/account/redeem}" class="btn btn-outline-secondary ms-2">Hủy</a>
          </form>
        </div>
      </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
