<!doctype html>
<html lang="vi" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thêm danh mục - Admin</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css(v=2)}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/admin.css}" />
  </head>
  <body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="admin-page">
      <section class="admin-shell">
        <div class="admin-header mb-3">
          <div>
            <div class="admin-header__title">Thêm danh mục mới</div>
            <p class="admin-header__subtitle">
              Gán danh mục con vào danh mục cha và (tùy chọn) đặc tính.
            </p>
          </div>
          <a href="/categories" class="admin-link-pill">← Về danh sách danh mục</a>
        </div>

        <div class="admin-card">
        <h1 class="admin-quick__section-title mb-3">Thông tin danh mục</h1>

        <form
          th:action="@{/categories/add}"
          th:object="${category}"
          method="post"
          enctype="multipart/form-data"
        >
          <div class="mb-3">
            <label for="parentCategoryId" class="form-label"
              >Danh mục cha <span class="text-danger">*</span></label
            >
            <select
              class="form-select"
              id="parentCategoryId"
              name="parentCategoryId"
              required
            >
              <option value="">-- Chọn danh mục cha --</option>
              <option
                th:each="p : ${parentCategories}"
                th:value="${p.id}"
                th:text="${p.name}"
              >
                Điện thoại
              </option>
            </select>
            <div
              class="invalid-feedback d-block"
              th:if="${#fields.hasErrors('parent')}"
              th:errors="*{parent}"
            ></div>
          </div>

          <div class="mb-3">
            <label for="attributeId" class="form-label">Đặc tính</label>
            <select class="form-select" id="attributeId" name="attributeId">
              <option value="">-- Chọn đặc tính (tùy chọn) --</option>
              <option
                th:each="attr : ${allAttributes}"
                th:value="${attr.id}"
                th:text="${attr.name}"
                th:attr="data-parent-id=${attr.parentCategory != null ? attr.parentCategory.id : 0}"
              ></option>
            </select>
            <div class="form-text">Ví dụ: Phụ kiện di động, Phụ kiện laptop... (chọn danh mục cha trước).</div>
          </div>

          <div class="mb-3">
            <label for="name" class="form-label"
              >Tên danh mục <span class="text-danger">*</span></label
            >
            <input
              type="text"
              class="form-control"
              id="name"
              th:field="*{name}"
              placeholder="Nhập tên danh mục"
              required
            />
            <div
              class="invalid-feedback"
              th:if="${#fields.hasErrors('name')}"
              th:errors="*{name}"
            >
              Error message
            </div>
          </div>

          <div class="mb-3">
            <label for="imageFile" class="form-label">Ảnh danh mục</label>
            <input
              type="file"
              class="form-control"
              id="imageFile"
              name="imageFile"
              accept="image/*"
            />
            <div class="form-text">Tùy chọn. Định dạng: JPG, PNG, GIF.</div>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-2">
            <a href="/categories" class="admin-quick__btn admin-quick__btn--outline">Hủy</a>
            <button type="submit" class="admin-quick__btn admin-quick__btn--primary">
              ✅ Tạo danh mục
            </button>
          </div>
        </form>
      </div>
    </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      (function() {
        var parentSelect = document.getElementById('parentCategoryId');
        var attrSelect = document.getElementById('attributeId');
        if (!parentSelect || !attrSelect) return;
        function filterAttributes() {
          var pid = parentSelect.value;
          for (var i = 0; i < attrSelect.options.length; i++) {
            var opt = attrSelect.options[i];
            if (opt.value === '') { opt.style.display = ''; continue; }
            opt.style.display = (opt.getAttribute('data-parent-id') === pid) ? '' : 'none';
            if (opt.selected && opt.style.display === 'none') attrSelect.value = '';
          }
        }
        parentSelect.addEventListener('change', filterAttributes);
        filterAttributes();
      })();
    </script>
  </body>
</html>
