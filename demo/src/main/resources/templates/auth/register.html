<!doctype html>
<html
  lang="vi"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Demo E-Commerce</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css(v=2)}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/auth.css}" />
  </head>
  <body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="auth-page">
      <section class="auth-card">
        <div class="auth-card__left">
          <img
            th:src="@{/images/TGDD-540x270.png}"
            src="/images/TGDD-540x270.png"
            alt="Minh họa đơn hàng"
          />
        </div>
        <div class="auth-card__right">
          <h1 class="auth-title">Đăng ký tài khoản</h1>
          <p class="auth-subtitle">
            Tạo tài khoản để lưu thông tin đặt hàng và theo dõi đơn hàng của bạn.
          </p>

          <div
            th:if="${successMessage}"
            class="auth-alert auth-alert--success"
            role="alert"
          >
            <span th:text="${successMessage}"></span>
          </div>
          <div
            th:if="${errorMessage}"
            class="auth-alert auth-alert--error"
            role="alert"
          >
            <span th:text="${errorMessage}"></span>
          </div>

          <form th:action="@{/auth/register}" method="post">
            <div class="mb-3">
              <label for="email" class="auth-form-label">Email *</label>
              <input
                type="email"
                class="form-control auth-input"
                id="email"
                name="email"
                required
              />
            </div>
            <div class="mb-3">
              <label for="phoneNumber" class="auth-form-label"
                >Số điện thoại *</label
              >
              <input
                type="tel"
                class="form-control auth-input"
                id="phoneNumber"
                name="phoneNumber"
                required
                pattern="0[0-9]{9}"
                title="Vietnamese phone number (10 digits starting with 0)"
              />
              <div class="form-text">10 số bắt đầu bằng 0</div>
            </div>

            <div class="mb-3">
              <label for="password" class="auth-form-label">Mật khẩu *</label>
              <input
                type="password"
                class="form-control auth-input"
                id="password"
                name="password"
                required
                minlength="6"
                maxlength="50"
              />
              <div class="form-text">Tối thiểu 6 ký tự</div>
            </div>
            <div class="mb-3">
              <label for="confirmPassword" class="auth-form-label"
                >Nhập lại mật khẩu *</label
              >
              <input
                type="password"
                class="form-control auth-input"
                id="confirmPassword"
                name="confirmPassword"
                required
                minlength="6"
                maxlength="50"
              />
            </div>

            <div class="d-grid mt-3">
              <button type="submit" class="btn auth-primary-btn">
                Đăng ký
              </button>
            </div>
          </form>

          <div class="auth-switch-text">
            Đã có tài khoản?
            <a th:href="@{/auth/login}">Đăng nhập ngay</a>
          </div>
        </div>
      </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
