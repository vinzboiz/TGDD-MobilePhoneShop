<!doctype html>
<html
  lang="vi"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Demo E-Commerce</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css(v=2)}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/auth.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css(v=2)}" />
  </head>
  <body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="auth-page">
      <section class="auth-card">
        <div class="auth-card__left">
          <img
            th:src="@{/images/TGDD-540x270.png}"
            src="/images/TGDD-540x270.png"
            alt="Minh họa đơn hàng"
          />
        </div>
        <div class="auth-card__right">
          <h1 class="auth-title">Đăng nhập tài khoản</h1>
          <p class="auth-subtitle">
            Nhập thông tin tài khoản để tiếp tục mua sắm và theo dõi đơn hàng.
          </p>

          <div
            th:if="${successMessage}"
            class="auth-alert auth-alert--success"
            role="alert"
          >
            <span th:text="${successMessage}"></span>
          </div>
          <div
            th:if="${errorMessage}"
            class="auth-alert auth-alert--error"
            role="alert"
          >
            <span th:text="${errorMessage}"></span>
          </div>

          <form th:action="@{/auth/login}" method="post">
            <div class="mb-3">
              <label for="username" class="auth-form-label"
                >Email hoặc tên đăng nhập</label
              >
              <input
                type="text"
                class="form-control auth-input"
                id="username"
                name="username"
                required
              />
            </div>
            <div class="mb-3">
              <label for="password" class="auth-form-label">Mật khẩu</label>
              <input
                type="password"
                class="form-control auth-input"
                id="password"
                name="password"
                required
              />
            </div>
            <div class="d-grid mt-3">
              <button type="submit" class="btn auth-primary-btn">
                Đăng nhập
              </button>
            </div>
          </form>

          <div class="auth-switch-text">
            Chưa có tài khoản?
            <a th:href="@{/auth/register}">Đăng ký ngay</a>
          </div>
        </div>
      </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
