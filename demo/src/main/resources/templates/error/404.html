<!doctype html>
<html lang="vi" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Không tìm thấy trang</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css(v=2)}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <style>
      .tgdd-404 {
        min-height: 60vh;
        display: grid;
        place-items: center;
        padding: 24px 16px 48px;
      }
      .tgdd-404__card {
        width: min(720px, 100%);
        background: #fff;
        border: 1px solid #eee;
        border-radius: 14px;
        padding: 28px 22px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      }
      .tgdd-404__code {
        font: 800 42px/1.1 Arial, Helvetica, sans-serif;
        color: #111;
        letter-spacing: 1px;
        margin: 0 0 8px;
      }
      .tgdd-404__title {
        font: 700 18px/1.3 Arial, Helvetica, sans-serif;
        margin: 0 0 10px;
        color: #222;
      }
      .tgdd-404__desc {
        margin: 0 0 18px;
        color: #555;
      }
      .tgdd-404__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .tgdd-404__btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 40px;
        padding: 0 14px;
        border-radius: 10px;
        border: 1px solid #ddd;
        background: #fff;
        text-decoration: none;
        font-weight: 700;
      }
      .tgdd-404__btn--primary {
        background: var(--tgdd-yellow);
        border-color: var(--tgdd-yellow);
      }
    </style>
  </head>
  <body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="tgdd-404">
      <section class="tgdd-404__card" role="region" aria-label="Không tìm thấy trang">
        <h1 class="tgdd-404__code">404</h1>
        <p class="tgdd-404__title">Trang bạn tìm không tồn tại hoặc bạn không có quyền truy cập.</p>
        <p class="tgdd-404__desc">
          Vui lòng kiểm tra lại đường dẫn, hoặc quay về trang chủ để tiếp tục mua sắm.
        </p>
        <div class="tgdd-404__actions">
          <a class="tgdd-404__btn tgdd-404__btn--primary" th:href="@{/}" href="/">Về trang chủ</a>
          <a class="tgdd-404__btn" th:href="@{/products}" href="/products">Xem sản phẩm</a>
          <a class="tgdd-404__btn" th:href="@{/cart}" href="/cart">Giỏ hàng</a>
        </div>
      </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </body>
</html>
