# Application Configuration
spring.application.name=demo
server.port=8080

# Allow circular references
spring.main.allow-circular-references=true

# MySQL Database Configuration (Laragon Local)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/shopdb?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# DevTools: tự restart khi file trong src thay đổi (cần build/copy vào target trước)
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/resources
# Thymeleaf Configuration
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template-location=true

# File Upload Configuration
# Increase limits to avoid 413 Content Too Large when uploading multiple images
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=80MB
# Allow more multipart parts per request (Tomcat)
server.tomcat.max-part-count=20

# Logging
logging.level.root=INFO
logging.level.com.hutech.demo=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
